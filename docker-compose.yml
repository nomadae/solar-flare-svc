services:
  # --- MySQL 8 ---
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: ${DATABASE:-SolarFlare}
      MYSQL_USER: ${USERDB:-solar}
      MYSQL_PASSWORD: ${PASSWORD:-solar1234}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- REST API ---
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # --- Spyder (realtime poller + daily netCDF & indices sync) ---
  spyder:
    build: .
    restart: unless-stopped
    command: ["/app/spyder/entrypoint.sh"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # --- Optional: database browser at http://localhost:8080 ---
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    profiles:
      - tools

volumes:
  mysql_data:
